<!doctype html><html><head><meta charset=utf-8><meta name=viewport content="width=device-width,initial-scale=1"><title>MÜV — Move Smart. Breathe Easy.</title><style>:root{--b:#0e4db8;--n:#082847;--bg:#eef6ff;--m:#66758a;--l:#d8e8fb}*{box-sizing:border-box}body{margin:0;background:var(--bg);font-family:Inter,system-ui,-apple-system,Segoe UI,sans-serif;color:#101827}button,input,select,textarea{font:inherit}button{border:0;cursor:pointer}.hide{display:none}.open{position:fixed;inset:0;background:#04172b;color:#fff;display:grid;place-items:center;z-index:20;overflow:hidden}.open:before{content:"";position:absolute;inset:-20%;background:radial-gradient(circle at 50% 25%,#0e4db899,transparent 34%),radial-gradient(circle at 15% 80%,#0e4db844,transparent 30%);animation:glow 4s infinite alternate}.openin{text-align:center;position:relative}.big{font-size:clamp(86px,16vw,170px);font-weight:1000;letter-spacing:-.1em;line-height:.78}.tag{font-size:12px;letter-spacing:.3em;font-weight:1000;text-transform:uppercase}.truckbtn{position:relative;width:300px;height:120px;margin:90px auto 16px;background:transparent;display:grid;place-items:center;animation:idle 1.5s infinite ease-in-out}.truck{width:260px;height:82px;border:8px solid #fff;border-radius:18px;background:#fff;position:relative;filter:drop-shadow(0 28px 25px #0007)}.truck:before{content:"";position:absolute;right:-48px;bottom:-8px;width:70px;height:66px;border:8px solid #fff;background:#eaf3ff;clip-path:polygon(0 0,65% 0,100% 100%,0 100%)}.truck:after{content:"";position:absolute;left:38px;right:-24px;bottom:-28px;height:28px;background:radial-gradient(circle,#061f3a 0 42%,white 43% 62%,transparent 63%) left/72px 28px repeat-x}.truckbtn span+span{position:absolute;background:var(--b);border:3px solid #fff;border-radius:999px;color:#fff;padding:12px 22px;font-size:20px;font-weight:1000}.open.zip .truckbtn{animation:zip .85s cubic-bezier(.1,.8,.18,1) forwards}.open.zip .big,.open.zip .tag{animation:fade .75s forwards}.open.garage{animation:lift .9s .55s forwards}.top{position:sticky;top:0;background:#ffffffed;backdrop-filter:blur(14px);border-bottom:1px solid var(--l);padding:15px 28px;display:flex;gap:16px;align-items:center;justify-content:space-between;z-index:5}.logo{font-size:31px;font-weight:1000;letter-spacing:-.08em;color:var(--n);background:none}.logo small{display:block;font-size:7px;letter-spacing:.22em;margin-top:-6px}.status{border:2px solid #c9ddfa;background:#eaf3ff;color:var(--b);border-radius:999px;padding:8px 12px;font-size:12px;font-weight:900}.tabs,.ptabs{display:flex;gap:8px;overflow:auto}.tab,.btn{border-radius:999px;padding:11px 15px;font-weight:950;background:transparent;color:#122033;white-space:nowrap}.tab.on,.btn.primary{background:var(--b);color:white}.wrap{width:min(1180px,calc(100% - 28px));margin:28px auto 80px}.card,.mini,.metric,.pcard{background:#fff;border:1px solid var(--l);border-radius:30px;box-shadow:0 22px 60px #0828471c;padding:clamp(22px,3vw,42px)}.k{text-transform:uppercase;color:var(--b);font-size:12px;font-weight:1000;letter-spacing:.2em}.h{font-size:clamp(42px,6vw,76px);line-height:.9;letter-spacing:-.07em;color:var(--n);margin:10px 0}.sub{font-size:clamp(18px,2vw,23px);line-height:1.35;color:var(--m);font-weight:760;max-width:860px}.grid{display:grid;gap:18px}.two{grid-template-columns:repeat(2,1fr)}.three{grid-template-columns:repeat(3,1fr)}.four{grid-template-columns:repeat(4,1fr)}.section{margin-top:25px;padding-top:23px;border-top:1px solid #e6f0ff}label{font-size:12px;font-weight:950;color:var(--n)}input,select,textarea{width:100%;border:2px solid var(--l);border-radius:18px;padding:14px 16px}.opt{border:2px solid var(--l);border-radius:20px;background:#fff;padding:15px;font-weight:900;text-align:left}.opt.on{background:#eaf3ff;border-color:var(--b)}.metric b{font-size:46px;letter-spacing:-.06em;color:var(--n);display:block}.chip{display:inline-flex;border:2px solid #cfe1fb;background:#eaf3ff;color:var(--b);border-radius:999px;padding:8px 11px;font-weight:900;font-size:12px}.green{background:#ecfdf5;border-color:#bbf7d0;color:#13813c}.amber{background:#fff8df;border-color:#ffde74;color:#a34e05}.quote{font-size:42px;font-weight:1000;color:var(--n);letter-spacing:-.07em}.route{height:150px;border:2px solid var(--l);border-radius:24px;background:linear-gradient(135deg,#e9f3ff,#fff);position:relative;overflow:hidden}.route:before{content:"";position:absolute;left:15%;right:15%;top:54%;height:6px;border-radius:99px;background:var(--b);transform:rotate(-13deg);box-shadow:0 0 0 8px #0e4db814}.pin{position:absolute;width:20px;height:20px;border-radius:50%;background:var(--b);box-shadow:0 0 0 8px #0e4db826}.a{left:15%;top:58%}.bb{right:16%;top:34%}.vtruck{position:absolute;left:45%;top:39%;font-size:34px;animation:drive 3s infinite ease-in-out}.portal .top{display:none}.shell{width:min(760px,100%);margin:0 auto;min-height:100vh;background:#edf5ff}.hero{background:#092b49;color:white;padding:48px 30px 26px}.plogo{font-size:76px;line-height:.8;letter-spacing:-.08em;font-weight:1000}.plogo small{display:block;font-size:8px;letter-spacing:.24em;margin-top:8px}.ptabs{gap:18px;padding-top:34px}.ptabs button{font-size:27px;border-radius:20px;padding:18px 24px;background:transparent;color:#ffffffbf;font-weight:1000}.ptabs button.on{background:#ffffff26;color:white}.pmain{padding:32px 30px 80px}.ptitle{font-size:64px;letter-spacing:-.075em;line-height:.9;color:var(--n);margin:18px 0 12px}.psub{font-size:28px;line-height:1.3;color:var(--m);font-weight:900}.pcard{margin-top:24px}.pcard h3{font-size:28px;letter-spacing:-.055em;margin:0 0 24px;color:var(--n)}.num{font-size:58px;font-weight:1000;color:var(--n);letter-spacing:-.07em}.pcard p{font-size:22px;color:var(--m);font-weight:850}.prow{display:grid;grid-template-columns:1fr auto;align-items:center;border:2px solid var(--l);border-bottom:0;background:white;padding:18px 22px;font-size:28px;font-weight:1000;color:var(--n)}.prow:first-child{border-radius:22px 22px 0 0}.prow:last-child{border-bottom:2px solid var(--l);border-radius:0 0 22px 22px}.badge{background:#e8f1ff;border:2px solid #cfe1fb;color:var(--b);border-radius:999px;padding:4px 12px;font-size:18px}@keyframes drive{50%{transform:translate(25px,-22px)}}@keyframes glow{to{transform:scale(1.05)}}@keyframes idle{50%{transform:translateY(-8px)}}@keyframes zip{to{transform:translateX(125vw) translateY(-18px)}}@keyframes fade{to{opacity:0;transform:translateY(-30px);filter:blur(8px)}}@keyframes lift{to{opacity:0;transform:translateY(-100%)}}@media(max-width:850px){.top{align-items:flex-start;flex-direction:column}.two,.three,.four{grid-template-columns:1fr}.ptabs button{font-size:20px}.ptitle{font-size:52px}}</style></head><body><div class=open id=open><div class=openin><div class=big>MÜV</div><div class=tag>Move Smart. Breathe Easy.</div><button class=truckbtn id=book><span class=truck></span><span>Book a MÜV</span></button><div class=tag>tap the truck to start</div></div></div><div id=app class=hide><header class=top><button class=logo id=homeLogo>MÜV<small>MOVE SMART. BREATHE EASY.</small></button><span class=status id=status>Ready to book</span><nav class=tabs id=tabs></nav></header><main class=wrap id=main></main></div><script>let r=sessionStorage.muv404;if(r){sessionStorage.removeItem('muv404');history.replaceState(null,'',r)}const T=[['home','Home'],['pool','MÜVPool'],['muvit','MÜVIt'],['market','MÜVMarket'],['mymuv','MyMÜV']],P=['dashboard','leads','moves','calendar','inventory','messages','routes','crew','exports','profile'];let S=JSON.parse(localStorage.muvapp1||'null')||{tab:'home',flow:'details',portal:'dashboard',items:1,vol:10,booked:false,move:{from:'',to:'',date:'',home:'1 Bedroom',type:'Apartment'}};const save=()=>localStorage.muvapp1=JSON.stringify(S),$=id=>document.getElementById(id),base=location.pathname.split('/mover')[0].split('/admin')[0].replace(/\/$/,'');let path=location.pathname.toLowerCase();if(path.includes('/mover')){S.tab='portal';S.portal=path.split('/mover/')[1]?.split('/')[0]||'dashboard'}if(path.includes('/admin'))S.tab='admin';function go(u){history.pushState(null,'',u);render()}function start(){S.tab='home';S.flow='details';save()}function show(){app.classList.remove('hide');render()}function done(){sessionStorage.muvIntro='1';open?.remove();show()}if(S.tab==='portal'||S.tab==='admin'||sessionStorage.muvIntro)done();else book.onclick=()=>{start();open.classList.add('zip');setTimeout(()=>{open.classList.add('garage');show()},650);setTimeout(done,1450)};homeLogo.onclick=()=>{S.tab='home';S.flow='details';save();go(base+'/')};window.onpopstate=()=>location.reload();function nav(){tabs.innerHTML=T.map(x=>`<button class="tab ${S.tab===x[0]?'on':''}" data-t="${x[0]}">${x[1]}</button>`).join('');document.querySelectorAll('[data-t]').forEach(b=>b.onclick=()=>{S.tab=b.dataset.t;if(S.tab==='home')S.flow='details';save();go(base+'/')})}function hero(k,h,s){return `<div class=k>${k}</div><h1 class=h>${h}</h1><p class=sub>${s}</p>`}function field(id,l,v='',type='text'){return `<div><label>${l}</label><input id=${id} type=${type} value="${v||''}"></div>`}function render(){document.body.classList.toggle('portal',S.tab==='portal');if(S.tab!=='portal')nav();status.textContent=S.booked?'Booked · MyMÜV active':S.items>1?`${S.items} items · 10' box truck`:'Ready to book';if(S.tab==='portal')return portal();if(S.tab==='admin')return admin();if(S.tab==='home')return home();if(S.tab==='pool')return pool();if(S.tab==='muvit')return muvit();if(S.tab==='market')return market();if(S.tab==='mymuv')return mymuv()}function home(){main.innerHTML=`<section class=card>${hero('Home','Tell us about your move.','We’ll tailor everything from here. Address, date, home type, route, scan, flat-rate quote — one calm flow.')}<div class="section grid two">${field('from','Moving from',S.move.from)}${field('to','Moving to',S.move.to)}${field('date','Move date',S.move.date,'date')}<div><label>Home size</label><select id=homes><option>Studio</option><option>1 Bedroom</option><option>2 Bedroom</option><option>3 Bedroom</option><option>4+ Bedroom</option></select></div></div><div class=section><label>Residence type</label><div class="grid four" style=margin-top:10px>${['Apartment','House','Condo','Storage'].map(x=>`<button class="opt ${S.move.type===x?'on':''}" data-type="${x}">🏠 ${x}</button>`).join('')}</div></div><div class="section grid two"><label class=opt><input type=checkbox> Flexible dates</label><label class=opt><input type=checkbox> Building requires COI</label><label class=opt><input type=checkbox> Elevator available</label><label class=opt><input type=checkbox> Packing help</label></div><div class="section spread"><div class=row><span class=chip>Route-aware estimate</span><span class="chip green">AI scan ready</span><span class=chip>COI workflow</span></div><button class="btn primary" id=cont>Continue to Scan →</button></div></section>`;homes.value=S.move.home;['from','to','date'].forEach(id=>$(id).oninput=e=>{S.move[id]=e.target.value;save()});homes.oninput=e=>{S.move.home=e.target.value;save()};document.querySelectorAll('[data-type]').forEach(b=>b.onclick=()=>{S.move.type=b.dataset.type;save();home()});cont.onclick=quote}function quote(){S.items=8;S.vol=342;save();main.innerHTML=`<section class=card>${hero('Inventory + Quotes','MÜV understands your move.','Your room scan creates a structured inventory, truck-size estimate, and vetted mover quotes.')}<div class="section grid four"><div class=metric><b>8</b><span>items scanned</span></div><div class=metric><b>342</b><span>cubic feet</span></div><div class=metric><b>10'</b><span>box truck</span></div><div class=metric><b>12.4</b><span>route miles</span></div></div><div class="section grid three">${['Atlas Blue Moving Co.','SettleRight Movers','District Van & Crew'].map((m,i)=>`<article class=mini><h2>${m}</h2><p>${i===0?'Premium COI-ready apartment specialists.':i===1?'Balanced pricing and clean communication.':'Budget/flexible route option.'}</p><div class=route><span class="pin a"></span><span class="pin bb"></span><span class=vtruck>🚚</span></div><div class=quote>$${[1280,1110,940][i].toLocaleString()}</div><div class=row><span class="chip green">Vetted</span><span class=chip>⭐ 4.${9-i}</span><span class="chip ${i===2?'amber':'green'}">${i===2?'COI request':'COI-ready'}</span></div><button class="btn primary" data-book=1 style="width:100%;margin-top:16px">Select mover</button></article>`).join('')}</div></section>`;document.querySelectorAll('[data-book]').forEach(b=>b.onclick=()=>{S.booked=true;S.tab='mymuv';save();go(base+'/')})}function pool(){main.innerHTML=`<section class=card>${hero('MÜVPool','Shared-route moving.','For flexible dates, MÜVPool checks compatibility, capacity, detour ratio, savings, and CO₂ reduction.')}<div class="section grid three">${[94,88,81].map((s,i)=>`<article class=mini><h2>Pool Match ${i+1}</h2><div class=route><span class="pin a"></span><span class="pin bb"></span><span class=vtruck>🚚</span></div><div class=quote>${s}%</div><p>${[24,18,12][i]}% savings · ${[38,31,22][i]} lb CO₂ saved</p><button class="btn primary">Join Pool</button></article>`).join('')}</div></section>`}function muvit(){main.innerHTML=`<section class=card>${hero('MÜVIt','Single-item moves.','Quick-tap one item, add pickup/dropoff, get a route-aware quote, and track the driver.')}<div class="section grid three">${['Couch','Mattress','Dining Table','Peloton','Dresser','TV'].map(x=>`<button class=opt>${x}</button>`).join('')}</div><div class="section grid two"><div class=mini><h2>Quick quote</h2><div class=quote>$145</div><span class="chip green">Driver available today</span></div><div class=route><span class="pin a"></span><span class="pin bb"></span><span class=vtruck>🚚</span></div></div></section>`}function market(){main.innerHTML=`<section class=card>${hero('MÜVMarket','Everything else you need.','Curated services for before, during, and after the move.')}<div class="section grid three">${['Cleaning','Estate sale','Supplies','Bulk removal','Interior design','Utilities'].map(x=>`<article class=mini><h2>${x}</h2><p>Verified provider with move-aware workflows.</p><button class="btn primary">Request quote</button></article>`).join('')}</div></section>`}function mymuv(){main.innerHTML=`<section class=card>${hero('MyMÜV','Your move command center.','Payment, secure messaging, tracking, timeline, inventory, documents, COI, and supplies live here after booking.')}<div class="section grid two"><div class=mini><h2>${S.booked?'Atlas Blue Moving Co.':'No booking yet'}</h2><p>${S.booked?'Crew assigned · Arrival window 9:00–11:00 AM':'Book a move to activate MyMÜV.'}</p><div class=route><span class="pin a"></span><span class="pin bb"></span><span class=vtruck>🚚</span></div></div><div class=mini><h2>Secure messaging</h2><p>Hi Jodi — we’re confirmed and COI-capable.</p><textarea rows=4 placeholder="Message mover or crew"></textarea><button class="btn primary" style=margin-top:12px>Send</button></div></div></section>`}function admin(){main.innerHTML=`<section class=card>${hero('Admin / Ops','Marketplace control center.','Separate ops layer for users, movers, jobs, disputes, payouts, COI, insurance, and quality control.')}<div class="section grid three">${['Users','Providers','Bookings','Disputes','Payouts','Risk flags'].map((x,i)=>`<div class=metric><b>${[128,34,19,2,7,4][i]}</b><span>${x}</span></div>`).join('')}</div></section>`}function portal(){let lab=S.portal[0].toUpperCase()+S.portal.slice(1);main.innerHTML=`<section class=shell><div class=hero><div class=plogo>MÜV<small>MOVE SMART. BREATHE EASY.</small></div><nav class=ptabs>${P.map(t=>`<button class="${S.portal===t?'on':''}" data-p="${t}">${t[0].toUpperCase()+t.slice(1)}</button>`).join('')}</nav></div><div class=pmain><span class=chip>Mover Portal</span><h1 class=ptitle>${lab}</h1><p class=psub>Operational view for moving company owners, dispatchers, and crew managers.</p>${pane()}</div></section>`;document.querySelectorAll('[data-p]').forEach(b=>b.onclick=()=>{S.portal=b.dataset.p;save();go(base+'/mover/'+S.portal)})}function pane(){if(S.portal==='dashboard')return `<div class=pcard><h3>New leads</h3><div class=num>3</div><p>Ready to accept or decline.</p></div><div class=pcard><h3>Booked jobs</h3><div class=num>1</div><p>Crew and truck status synced to MyMÜV.</p></div><div class=pcard><h3>Capacity</h3><div class=num>88</div><p>Provider capacity score.</p></div><div class=pcard><h3>Inventory preview</h3><div class=prow><span>Living Room</span><span class=badge>2</span></div><div class=prow><span>TV</span><span class=badge>x1</span></div><div class=prow><span>Sofa</span><span class=badge>x1</span></div></div>`;if(S.portal==='profile')return `<div class=pcard><h3>Customizable mover profile</h3><div class="grid two"><input value="Atlas Blue Moving Co."><input value="(917) 555-0188"><input value="dispatch@atlasblue.test"><input value="NYC, Brooklyn, Queens, Jersey City"><textarea rows=4>COI-ready apartment specialists with full-service packing and premium building workflows.</textarea><textarea rows=4>License, insurance, cancellation policy, service area, operating hours, terms.</textarea></div><button class="btn primary" style=margin-top:18px>Save profile</button></div>`;return [1,2,3,4,5,6].map(n=>`<div class=pcard><h3>${S.portal} item ${n}</h3><p>Route, inventory, customer notes, crew status, COI, messages, dispatch metadata, and exports are available here.</p><button class="btn">Open</button></div>`).join('')}</script></body></html>
