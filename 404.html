<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MÜV MVP — Move Smart. Breathe Easy.</title>
  <style>
    :root{
      --muv-blue:#0E4DB8;
      --muv-blue-2:#0655BE;
      --navy:#0A2540;
      --soft:#E8F0FB;
      --ink:#0f172a;
      --muted:#64748b;
      --line:#dbeafe;
      --green:#16A34A;
      --amber:#F59E0B;
      --red:#DC2626;
      --bg:#f8fbff;
      --card:#fff;
      --shadow:0 22px 60px rgba(10,37,64,.12);
      --radius:26px;
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--ink);background:var(--bg);}
    body{min-height:100vh;overflow-x:hidden}
    button,input,select,textarea{font:inherit}
    button{cursor:pointer;border:0}
    .hidden{display:none!important}
    .sr{position:absolute;left:-9999px}
    .app{min-height:100vh;display:flex;flex-direction:column}
    .small-logo{height:28px;object-fit:contain;display:block}
    .topbar{position:sticky;top:0;z-index:80;background:rgba(255,255,255,.82);backdrop-filter:blur(18px);border-bottom:1px solid rgba(14,77,184,.1);display:flex;align-items:center;justify-content:space-between;padding:14px clamp(16px,3vw,34px)}
    .top-left{display:flex;align-items:center;gap:16px}
    .status-chip{display:inline-flex;align-items:center;gap:8px;border:1px solid rgba(14,77,184,.15);background:var(--soft);color:var(--muv-blue);border-radius:999px;padding:8px 12px;font-weight:800;font-size:12px;letter-spacing:.02em}
    .primary-tabs{display:flex;gap:8px;align-items:center;overflow-x:auto;padding-bottom:2px}
    .tab{padding:10px 13px;border-radius:999px;color:var(--navy);background:transparent;font-weight:850;font-size:13px;white-space:nowrap}
    .tab.active{background:var(--muv-blue);color:#fff;box-shadow:0 10px 24px rgba(14,77,184,.28)}
    .tab.secondary{border:1px solid rgba(14,77,184,.18);background:#fff;color:var(--muv-blue)}
    .main{width:min(1200px,calc(100% - 28px));margin:22px auto 80px;}
    .card{background:rgba(255,255,255,.94);border:1px solid rgba(14,77,184,.11);border-radius:var(--radius);box-shadow:var(--shadow);padding:clamp(18px,3vw,34px)}
    .section-title{font-size:clamp(30px,5vw,60px);line-height:.95;margin:0;color:var(--navy);letter-spacing:-.06em}
    .eyebrow{font-size:12px;text-transform:uppercase;letter-spacing:.18em;color:var(--muv-blue);font-weight:950;margin-bottom:10px}
    .subhead{font-size:clamp(16px,2vw,20px);color:var(--muted);line-height:1.45;max-width:760px;margin:12px 0 0}
    .grid{display:grid;gap:16px}
    .grid.two{grid-template-columns:repeat(2,minmax(0,1fr))}
    .grid.three{grid-template-columns:repeat(3,minmax(0,1fr))}
    .grid.four{grid-template-columns:repeat(4,minmax(0,1fr))}
    .field{display:flex;flex-direction:column;gap:8px;position:relative}
    label{font-size:12px;color:var(--navy);font-weight:900;letter-spacing:.02em}
    input,select,textarea{width:100%;padding:13px 14px;border:1px solid rgba(14,77,184,.18);border-radius:16px;background:#fff;color:var(--ink);outline:none;box-shadow:0 8px 20px rgba(10,37,64,.04)}
    input:focus,select:focus,textarea:focus{border-color:var(--muv-blue);box-shadow:0 0 0 4px rgba(14,77,184,.11)}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:9px;border-radius:999px;padding:13px 18px;font-weight:950;background:var(--navy);color:#fff;box-shadow:0 12px 28px rgba(10,37,64,.18);transition:.2s transform,.2s box-shadow,.2s opacity;white-space:nowrap}
    .btn:hover{transform:translateY(-1px);box-shadow:0 17px 36px rgba(10,37,64,.22)}
    .btn.primary{background:var(--muv-blue)}
    .btn.ghost{background:#fff;color:var(--muv-blue);border:1px solid rgba(14,77,184,.18);box-shadow:none}
    .btn.success{background:var(--green)}
    .btn.warn{background:var(--amber)}
    .btn.small{padding:9px 12px;font-size:12px}
    .btn:disabled{opacity:.45;cursor:not-allowed;transform:none}
    .row{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
    .spread{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
    .pill{border:1px solid rgba(14,77,184,.16);background:#fff;color:var(--navy);border-radius:999px;padding:9px 12px;font-size:12px;font-weight:850;display:inline-flex;align-items:center;gap:7px}
    .pill.blue{background:var(--soft);color:var(--muv-blue)}
    .pill.green{background:#ecfdf5;color:var(--green);border-color:rgba(22,163,74,.2)}
    .pill.amber{background:#fffbeb;color:#b45309;border-color:rgba(245,158,11,.2)}
    .pill.red{background:#fef2f2;color:var(--red);border-color:rgba(220,38,38,.2)}
    .suggestions{position:absolute;z-index:30;top:74px;left:0;right:0;background:#fff;border:1px solid rgba(14,77,184,.14);border-radius:18px;box-shadow:0 18px 38px rgba(10,37,64,.16);overflow:hidden;max-height:230px;overflow-y:auto}
    .suggestions button{display:block;width:100%;text-align:left;padding:12px 14px;background:#fff;border-bottom:1px solid #eef4ff;color:var(--navy);font-weight:750}
    .suggestions button:hover{background:var(--soft)}

    /* Opening: one big wordmark, one truck CTA, then garage-door reveal */
    .opening{position:fixed;inset:0;z-index:1000;background:#02060f;display:grid;place-items:center;overflow:hidden;color:#fff;isolation:isolate}
    .opening:before{content:"";position:absolute;inset:-20%;background:radial-gradient(circle at 50% 28%,rgba(14,77,184,.34),transparent 34%),radial-gradient(circle at 20% 80%,rgba(6,85,190,.16),transparent 26%);filter:blur(4px);animation:openingGlow 4s ease-in-out infinite alternate;z-index:-2}
    .opening:after{content:"";position:absolute;left:0;right:0;bottom:0;height:28vh;background:linear-gradient(180deg,transparent,rgba(14,77,184,.12));z-index:-1}
    .opening-inner{width:min(1080px,92vw);height:min(760px,92vh);text-align:center;position:relative;display:grid;grid-template-rows:auto 1fr;align-items:center;padding:clamp(24px,4vw,46px) 0 80px}
    .hero-wordmark{width:min(820px,88vw);height:auto;margin:0 auto;display:block;filter:drop-shadow(0 24px 44px rgba(14,77,184,.22));animation:wordIn .85s cubic-bezier(.2,.8,.2,1) both;transform-origin:center}
    .launch-stage{position:relative;align-self:end;width:min(760px,88vw);height:210px;margin:0 auto 6vh;display:grid;place-items:center}
    .hero-road{position:absolute;left:50%;bottom:16px;transform:translateX(-50%);width:100%;height:92px;border-radius:999px;background:linear-gradient(90deg,transparent,rgba(14,77,184,.22),transparent)}
    .hero-road:before,.hero-road:after{content:"";position:absolute;left:7%;right:7%;height:6px;border-radius:999px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.32),transparent);animation:roadPulse 1.4s linear infinite}.hero-road:before{top:30px}.hero-road:after{bottom:25px;animation-delay:.35s}
    .truck-launch{position:absolute;left:50%;bottom:30px;transform:translateX(-50%);width:300px;height:156px;background:transparent;border:0;padding:0;display:grid;place-items:center;filter:drop-shadow(0 28px 28px rgba(0,0,0,.35));animation:truckIdle 1.65s ease-in-out infinite;transition:filter .2s ease;z-index:3}
    .truck-launch:focus-visible{outline:4px solid rgba(255,255,255,.8);outline-offset:10px;border-radius:24px}
    .truck-launch img{width:100%;height:auto;display:block;pointer-events:none}
    .truck-label{position:absolute;left:50%;top:50%;transform:translate(-50%,-58%);background:#fff;color:var(--muv-blue);border:3px solid rgba(14,77,184,.24);border-radius:999px;padding:11px 20px;font-size:18px;font-weight:950;letter-spacing:-.02em;box-shadow:0 16px 35px rgba(10,37,64,.24);white-space:nowrap;pointer-events:none}
    .truck-launch:hover .truck-label{transform:translate(-50%,-64%) scale(1.03)}
    .speed-lines{position:absolute;left:calc(50% - 320px);bottom:88px;width:230px;height:74px;opacity:.0;transition:opacity .25s;pointer-events:none}.speed-lines span{position:absolute;right:0;height:8px;border-radius:999px;background:linear-gradient(90deg,transparent,#0E4DB8);animation:speedLine .45s linear infinite}.speed-lines span:nth-child(1){top:4px;width:180px}.speed-lines span:nth-child(2){top:32px;width:230px;animation-delay:.08s}.speed-lines span:nth-child(3){top:60px;width:150px;animation-delay:.16s}
    .opening.zip .speed-lines{opacity:1}.opening.zip .truck-launch{animation:truckLaunch .82s cubic-bezier(.1,.8,.18,1) forwards}.opening.zip .hero-wordmark{animation:wordExit .7s cubic-bezier(.4,0,.2,1) forwards}.opening.zip .hero-road{animation:roadExit .7s ease forwards}
    .garage-reveal{position:absolute;inset:0;z-index:20;pointer-events:none;opacity:0;transition:opacity .14s ease;background:transparent}.opening.garage-opening .garage-reveal{opacity:1}.reveal-panel{position:absolute;left:0;width:100%;height:50%;background:linear-gradient(180deg,#0A2540,#0E4DB8);box-shadow:0 0 0 1px rgba(255,255,255,.08),0 24px 60px rgba(0,0,0,.4);display:grid;place-items:center}.reveal-panel.top{top:0;border-bottom:2px solid rgba(255,255,255,.25)}.reveal-panel.bottom{bottom:0;border-top:2px solid rgba(255,255,255,.25)}.reveal-slat{width:min(760px,82vw);height:7px;border-radius:999px;background:rgba(255,255,255,.22);box-shadow:0 26px 0 rgba(255,255,255,.16),0 52px 0 rgba(255,255,255,.12)}.reveal-copy{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);z-index:24;background:#fff;color:var(--muv-blue);border-radius:999px;padding:12px 18px;font-weight:950;letter-spacing:.02em;box-shadow:0 24px 50px rgba(0,0,0,.22)}.opening.garage-opening .reveal-panel.top{animation:garageLiftTop 1.08s .18s cubic-bezier(.77,0,.18,1) forwards}.opening.garage-opening .reveal-panel.bottom{animation:garageLiftBottom 1.08s .18s cubic-bezier(.77,0,.18,1) forwards}.opening.garage-opening .reveal-copy{animation:garageCopyOut .55s .2s ease forwards}
    @keyframes openingGlow{to{transform:scale(1.05) translateY(-1%)}}
    @keyframes wordIn{from{opacity:0;transform:scale(.92) translateY(18px)}to{opacity:1;transform:scale(1) translateY(0)}}
    @keyframes wordExit{to{opacity:0;transform:scale(.86) translateY(-20px);filter:blur(8px)}}
    @keyframes truckIdle{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-7px)}}
    @keyframes truckLaunch{0%{transform:translateX(-50%) translateY(0) scale(1)}18%{transform:translateX(-68%) translateY(2px) scale(1.02)}100%{transform:translateX(132vw) translateY(-8px) scale(1.05);filter:drop-shadow(-45px 18px 18px rgba(14,77,184,.28)) blur(.4px)}}
    @keyframes roadPulse{from{transform:translateX(20%);opacity:.2}to{transform:translateX(-20%);opacity:.75}}
    @keyframes speedLine{from{transform:translateX(44px);opacity:0}50%{opacity:1}to{transform:translateX(-34px);opacity:0}}
    @keyframes roadExit{to{opacity:0;transform:translateX(-50%) scaleX(1.08)}}
    @keyframes garageLiftTop{to{transform:translateY(-104%)}}
    @keyframes garageLiftBottom{to{transform:translateY(104%)}}
    @keyframes garageCopyOut{to{opacity:0;transform:translate(-50%,-50%) scale(.92)}}
    @media(max-width:700px){.opening-inner{height:86vh;padding-bottom:70px}.hero-wordmark{width:min(620px,88vw)}.launch-stage{height:180px;margin-bottom:5vh}.truck-launch{width:240px}.truck-label{font-size:15px;padding:9px 16px}.speed-lines{left:calc(50% - 265px);transform:scale(.82);transform-origin:right center}}

    /* Home scene */
    .home-scene{min-height:360px;border-radius:32px;overflow:hidden;position:relative;background:linear-gradient(155deg,#dbeafe,#fff 52%,#f8fbff);border:1px solid rgba(14,77,184,.12);box-shadow:inset 0 0 0 1px rgba(255,255,255,.7)}
    .sky{position:absolute;inset:0;background:linear-gradient(180deg,#a9d4ff 0%,#f9fbff 58%,#f0f7ff 100%);transition:.4s}
    .scene-night .sky{background:linear-gradient(180deg,#06172f,#0A2540 54%,#16365f)}
    .scene-evening .sky{background:linear-gradient(180deg,#ffa87d,#ffd6a1 42%,#f7fbff)}
    .scene-morning .sky{background:linear-gradient(180deg,#ffddb0,#c6e3ff 60%,#f7fbff)}
    .sun{position:absolute;right:10%;top:12%;width:68px;height:68px;border-radius:50%;background:#fff2a8;box-shadow:0 0 70px #ffe28a}
    .scene-night .sun{background:#f8fafc;width:52px;height:52px;box-shadow:0 0 36px rgba(255,255,255,.52)}
    .house{position:absolute;left:50%;bottom:30px;transform:translateX(-50%);width:min(720px,82vw);height:260px}
    .building{position:absolute;bottom:0;left:10%;width:80%;height:210px;background:#fff;border:5px solid #dbeafe;border-radius:28px 28px 16px 16px;box-shadow:0 24px 50px rgba(10,37,64,.12)}
    .roof{position:absolute;left:6%;bottom:190px;width:88%;height:90px;background:var(--muv-blue);clip-path:polygon(0 70%,50% 0,100% 70%,95% 100%,5% 100%);}
    .door{position:absolute;bottom:0;left:45%;width:75px;height:118px;background:var(--navy);border-radius:18px 18px 0 0;overflow:hidden}
    .garage{position:absolute;bottom:0;left:14%;width:180px;height:110px;background:#dbeafe;border-radius:18px 18px 0 0;overflow:hidden;border:4px solid #bfdbfe}
    .garage:before{content:"";position:absolute;inset:0;background:repeating-linear-gradient(0deg,#fff 0,#fff 13px,#e8f0fb 14px,#e8f0fb 18px);transform:translateY(0);animation:garageOpen 1.1s .35s ease forwards}
    .window{position:absolute;width:80px;height:62px;background:#e8f0fb;border-radius:16px;border:4px solid #bfdbfe;box-shadow:inset 0 0 0 5px rgba(255,255,255,.45)}
    .window.w1{left:38%;top:72px}.window.w2{right:17%;top:72px}
    .scene-night .window{background:#ffeaa8;box-shadow:0 0 32px rgba(255,234,168,.55),inset 0 0 0 5px rgba(255,255,255,.25)}
    .tiny-truck{position:absolute;left:20%;bottom:20px;width:120px;animation:parkTruck 1.3s .4s ease both;filter:drop-shadow(0 16px 16px rgba(10,37,64,.15))}
    @keyframes garageOpen{to{transform:translateY(-86px)}}
    @keyframes parkTruck{from{transform:translateX(-340px)}to{transform:translateX(0)}}
    .home-form{margin-top:-44px;position:relative;z-index:3}
    .form-section{padding-top:12px;margin-top:18px;border-top:1px solid #edf4ff}
    .select-card{padding:14px;border-radius:18px;border:1px solid rgba(14,77,184,.13);background:#fff;display:flex;align-items:center;gap:10px;font-weight:850;color:var(--navy);cursor:pointer}
    .select-card.active{background:var(--soft);border-color:var(--muv-blue);box-shadow:0 0 0 3px rgba(14,77,184,.08)}
    input[type="checkbox"]{width:auto;box-shadow:none}

    /* Scanner */
    .scanner{position:fixed;inset:0;z-index:900;background:#020617;color:#fff;display:flex;flex-direction:column}
    .scanner-top{height:70px;display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid rgba(255,255,255,.12);background:rgba(2,6,23,.8);backdrop-filter:blur(16px);overflow-x:auto}
    .room-chip{border:1px solid rgba(255,255,255,.22);background:rgba(255,255,255,.04);color:#fff;padding:9px 12px;border-radius:999px;font-weight:850;white-space:nowrap;font-size:12px}
    .room-chip.active{background:var(--muv-blue);border-color:var(--muv-blue)}
    .scanner-body{display:grid;grid-template-rows:minmax(0,1fr) 30%;height:calc(100vh - 70px)}
    .camera{position:relative;overflow:hidden;background:#111827}
    .room-illustration{position:absolute;inset:0;background:linear-gradient(180deg,#172554,#0f172a);}
    .room-illustration:before{content:"";position:absolute;left:8%;right:8%;top:10%;height:55%;background:linear-gradient(120deg,rgba(255,255,255,.13),rgba(255,255,255,.03));border-radius:26px;transform:perspective(500px) rotateX(7deg)}
    .floor{position:absolute;left:-5%;right:-5%;bottom:-10%;height:42%;background:linear-gradient(0deg,#0a1024,#1e293b);transform:skewY(-2deg)}
    .scan-shimmer{position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(14,77,184,.18),transparent);width:35%;animation:shimmer 2.2s linear infinite;mix-blend-mode:screen}
    @keyframes shimmer{from{transform:translateX(-120%)}to{transform:translateX(360%)}}
    .scan-indicator{position:absolute;left:18px;top:18px;background:rgba(2,6,23,.58);border:1px solid rgba(255,255,255,.14);padding:10px 14px;border-radius:999px;font-size:13px;font-weight:950;display:flex;align-items:center;gap:8px}
    .dot{width:9px;height:9px;border-radius:50%;background:var(--green);box-shadow:0 0 0 rgba(22,163,74,.7);animation:pulseDot 1.4s infinite}
    @keyframes pulseDot{70%{box-shadow:0 0 0 11px rgba(22,163,74,0)}}
    .scan-box{position:absolute;border:2px solid #60a5fa;background:rgba(14,77,184,.1);border-radius:14px;box-shadow:0 0 0 4px rgba(14,77,184,.18),0 0 32px rgba(96,165,250,.36);animation:boxPulse 1.2s infinite}
    .scan-label{position:absolute;top:-36px;left:0;background:var(--muv-blue);color:#fff;border-radius:999px;padding:7px 10px;font-size:12px;font-weight:950;white-space:nowrap}
    @keyframes boxPulse{50%{border-color:#bfdbfe;box-shadow:0 0 0 8px rgba(14,77,184,.09),0 0 38px rgba(96,165,250,.5)}}
    .prompt{position:absolute;background:#fff;color:var(--navy);border-radius:24px;padding:14px;min-width:230px;box-shadow:0 28px 70px rgba(0,0,0,.35);border:1px solid rgba(14,77,184,.14);z-index:5}
    .prompt strong{display:block;font-size:18px;letter-spacing:-.03em;margin-bottom:3px}
    .inventory-panel{background:#fff;color:var(--ink);border-radius:28px 28px 0 0;margin-top:-20px;position:relative;z-index:4;padding:14px 16px 16px;overflow:auto;border-top:1px solid rgba(14,77,184,.13)}
    .meter{height:12px;background:#e2e8f0;border-radius:999px;overflow:hidden}
    .meter > span{display:block;height:100%;background:linear-gradient(90deg,var(--muv-blue),#3b82f6);border-radius:999px;transition:width .25s}
    .mini-truck-meter{height:48px;border:3px solid var(--muv-blue);border-radius:12px 18px 18px 12px;position:relative;overflow:hidden;background:#f8fbff;width:120px}
    .mini-truck-meter:after{content:"";position:absolute;right:-22px;top:16px;width:34px;height:28px;background:var(--muv-blue);clip-path:polygon(0 0,65% 0,100% 100%,0 100%)}
    .mini-truck-meter .fill{height:100%;background:rgba(14,77,184,.2);transition:width .25s}
    .items-list{display:grid;gap:8px;margin-top:10px;max-height:170px;overflow:auto}
    .item-row{display:grid;grid-template-columns:1fr auto auto;gap:8px;align-items:center;padding:9px 10px;border:1px solid #e5efff;border-radius:14px;background:#f8fbff;font-size:13px}
    .qty{display:flex;align-items:center;gap:6px}.qty button{width:24px;height:24px;border-radius:50%;background:#e8f0fb;color:var(--muv-blue);font-weight:950}

    /* Cards/modules */
    .summary-bar{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px;margin:18px 0}
    .metric{padding:16px;border-radius:20px;background:linear-gradient(180deg,#fff,#f8fbff);border:1px solid rgba(14,77,184,.12)}
    .metric b{display:block;font-size:24px;color:var(--navy);letter-spacing:-.04em}.metric span{font-size:12px;color:var(--muted);font-weight:800}
    .quote-card,.vendor-card,.pool-card,.portal-card{border:1px solid rgba(14,77,184,.12);border-radius:24px;background:#fff;padding:18px;box-shadow:0 14px 32px rgba(10,37,64,.08)}
    .quote-price{font-size:36px;letter-spacing:-.06em;color:var(--navy);font-weight:950;margin:10px 0}
    .avatar{width:48px;height:48px;border-radius:16px;background:var(--soft);display:grid;place-items:center;color:var(--muv-blue);font-weight:950;font-size:20px}
    .route-map{height:150px;border-radius:22px;background:linear-gradient(135deg,#e8f0fb,#fff);border:1px solid #dbeafe;position:relative;overflow:hidden}
    .route-map:before{content:"";position:absolute;left:14%;top:60%;width:72%;height:4px;background:var(--muv-blue);border-radius:999px;transform:rotate(-13deg);box-shadow:0 0 0 6px rgba(14,77,184,.08)}
    .route-map .pin{position:absolute;width:18px;height:18px;border-radius:50%;background:var(--muv-blue);box-shadow:0 0 0 7px rgba(14,77,184,.15)}
    .route-map .pin.a{left:16%;top:58%}.route-map .pin.b{right:17%;top:36%}
    .tracking-truck{position:absolute;width:42px;left:45%;top:43%;animation:drive 3.5s ease-in-out infinite}
    @keyframes drive{0%,100%{transform:translate(-20px,16px)}50%{transform:translate(20px,-16px)}}
    .timeline{display:grid;gap:12px;margin-top:12px}.timeline-item{display:grid;grid-template-columns:32px 1fr;gap:10px;align-items:start}.check{width:30px;height:30px;border-radius:50%;background:var(--green);color:#fff;display:grid;place-items:center;font-weight:950}.pending{background:#dbeafe;color:var(--muv-blue)}
    .chat-box{border:1px solid #e5efff;border-radius:22px;overflow:hidden;background:#f8fbff}.chat-messages{height:210px;overflow:auto;padding:14px;display:flex;flex-direction:column;gap:10px}.msg{max-width:78%;padding:10px 12px;border-radius:16px;background:#fff;border:1px solid #e5efff;font-size:13px}.msg.me{align-self:flex-end;background:var(--muv-blue);color:#fff}.chat-input{display:flex;gap:8px;padding:10px;background:#fff;border-top:1px solid #e5efff}.chat-input input{border-radius:999px}
    .footer{width:min(1200px,calc(100% - 28px));margin:0 auto 30px;color:var(--muted);font-size:12px;display:flex;justify-content:space-between;gap:14px;flex-wrap:wrap}.footer button{background:none;color:var(--muv-blue);font-weight:850}

    if(m.residenceType==='Apartment') cents*=1.05;
    if(Number(m.stairsPickup)>0) cents*=1+.08*Number(m.stairsPickup);
    if(Number(m.stairsDropoff)>0) cents*=1+.08*Number(m.stairsDropoff);
    if(m.longCarry) cents*=1.08;
    if(m.coiRequired) cents*=1.03;
    if(state.inventory.some(i=>i.heavy||i.specialHandling)) cents*=1.08;
    if(m.flexible) cents*=.95;
    const mult={"Bare Bones":1,"Standard":1.15,"Full Service":1.35}[pkg||state.selectedPackage] || 1.15;
    cents*=mult;
    const tier={Budget:.92,Standard:1,Premium:1.12}[mover?.tier||'Standard'] || 1;
    return Math.round(cents*tier);
  }

      const possibleView = window.location.pathname.toLowerCase().split('/').filter(Boolean)[1];
      if(['dashboard','leads','moves','calendar','inventory','messages','routes','crew','exports','profile'].includes(possibleView)) state.portalView = possibleView;

  } else if(bookEl && openingEl){

  function addressBlock(key,title){const a=state.move[key]||{};return `<div class="grid" style="gap:12px"><h3 style="margin:0;color:var(--navy)">${title}</h3><div class="field"><label>Street address</label><input class="addr" data-key="${key}" id="${key}Street" placeholder="Start typing an address" value="${a.street||''}" autocomplete="off"><div class="suggestions hidden" id="${key}Suggest"></div></div><div class="grid three"><div class="field"><label>Unit / Apt</label><input id="${key}Unit" value="${a.unit||''}" placeholder="4B"></div><div class="field"><label>City</label><input id="${key}City" value="${a.city||''}"></div><div class="field"><label>State</label><input id="${key}State" value="${a.state||''}" maxlength="2"></div></div><div class="field"><label>ZIP code</label><input id="${key}Zip" value="${a.zip||''}"></div></div>`}

  let scanTimer=null, currentDetection=null, scanIdx=0;
  function openScanner(){
    const mount=document.getElementById('scannerMount'); scanIdx=0; currentDetection=null;
    mount.innerHTML=`<div class="scanner" id="scanner"><div class="scanner-top"><button class="room-chip" id="closeScan">← Back</button>${rooms.map(r=>`<button class="room-chip ${state.scanRoom===r?'active':''}" data-room="${r}">${r}</button>`).join('')}<button class="room-chip" id="customRoom">+ Custom</button></div><div class="scanner-body"><div class="camera" id="camera"><div class="room-illustration"><div class="floor"></div></div><div class="scan-shimmer"></div><div class="scan-indicator"><span class="dot"></span> Scanning ${state.scanRoom}…</div><div id="overlay"></div></div><div class="inventory-panel" id="scanPanel"></div></div></div>`;
    document.getElementById('closeScan').onclick=()=>{clearInterval(scanTimer); mount.innerHTML=''; state.flow='details'; save(); render();};
    document.getElementById('customRoom').onclick=()=>{const r=prompt('Room name?'); if(r){state.scanRoom=r; if(!timelines[r]) timelines[r]=[]; save(); openScanner();}};

  function nextDetection(){
    const list=timelines[state.scanRoom] || timelines['Living Room'];
    if(!list.length) return;
    currentDetection={...list[scanIdx % list.length], id:uid()}; scanIdx++;
    const key=state.scanRoom+'::'+currentDetection.normalizedName;
    if(state.inventory.some(i=>i.key===key)) { renderOverlay(currentDetection,false); return; }
    renderOverlay(currentDetection,true);
  }
  function renderOverlay(d,prompt=true){
    const overlay=document.getElementById('overlay'); if(!overlay) return;
    const left=d.bbox.x*100, top=d.bbox.y*100, width=d.bbox.width*100, height=d.bbox.height*100;
    const promptLeft=clamp(left+width+2,4,72), promptTop=clamp(top,8,70);
    overlay.innerHTML=`<div class="scan-box" style="left:${left}%;top:${top}%;width:${width}%;height:${height}%"><span class="scan-label">${d.name}? · ${Math.round(d.confidence*100)}%</span></div>${prompt?`<div class="prompt" style="left:${promptLeft}%;top:${promptTop}%"><strong>Add ${d.name}?</strong><div style="color:#64748b;font-size:13px;margin-bottom:10px">${d.volumeCuft} cu ft · ${d.estimatedWeightLb} lb ${d.fragile?'· fragile':''} ${d.heavy?'· heavy':''}</div><div class="row"><button class="btn small ghost" id="skipDet">Skip</button><button class="btn small primary" id="addDet">Add</button></div></div>`:''}`;
    if(prompt){document.getElementById('addDet').onclick=()=>addDetection(d); document.getElementById('skipDet').onclick=()=>{overlay.innerHTML='';};}
  }
  function addDetection(d){
    const key=state.scanRoom+'::'+d.normalizedName;
    const item={...d, id:uid(), key, room:state.scanRoom, qty:d.qty||1, source:'DEMO_VIDEO'};
    state.inventory.push(item); save(); renderScanPanel(); renderOverlay(d,false); toast(`${d.name} added to ${state.scanRoom}.`);
  }
  function renderScanPanel(){
    const panel=document.getElementById('scanPanel'); if(!panel) return;

    panel.innerHTML=`<div class="spread"><div><b>${snap.count} items · ${snap.volume} cu ft · ${snap.name} · ${snap.pct}% full</b><div class="meter" style="margin-top:8px"><span style="width:${snap.pct}%"></span></div></div><div class="mini-truck-meter"><div class="fill" style="width:${snap.pct}%"></div></div></div><div class="items-list">${Object.entries(byRoom).map(([room,items])=>`<div><b style="font-size:12px;color:#0A2540">${room} · ${items.length}</b>${items.map(i=>itemRow(i)).join('')}</div>`).join('')||'<div class="pill amber">Add at least one item to continue.</div>'}</div><div class="spread" style="margin-top:12px"><button class="btn ghost small" id="manualAdd">+ Add manually</button><button class="btn primary" id="doneScan" ${state.inventory.length?'':'disabled'}>Done scanning →</button></div>`;

:''}${i.specialHandling?'Special ':''}</td><td><button class="btn small ghost" data-delete-item="${i.id}">Delete</button></td></tr>`).join('')}</tbody></table><div class="spread"><button class="btn ghost" id="backDetails">Back to details</button><button class="btn primary" id="showQuotes">Show vetted movers →</button></div></section>`;

  function summaryBar(){ const s=truckSnapshot(), r=state.route||estimateRoute(); return `<div class="summary-bar"><div class="metric"><b>${s.count}</b><span>items scanned</span></div><div class="metric"><b>${s.volume}</b><span>cubic feet</span></div><div class="metric"><b>${s.weight.toLocaleString()}</b><span>estimated pounds</span></div><div class="metric"><b>${r.distanceMiles}</b><span>route miles</span></div></div>`;}

  function renderMatch(main){

    if(view==='moves') return `<div class="portal-list-grid">${['Williamsburg 1BR · confirmed','Park Slope townhouse · pending COI','MÜVIt Peloton · today'].map((x,i)=>`<div class="portal-card"><span class="pill ${i===0?'green':'amber'}">Move</span><h3>${x}</h3><p>Route, crew, messages, payment, and inventory change alerts are connected to MyMÜV.</p><button class="btn ghost">Open move</button></div>`).join('')}</div>`;
    if(view==='calendar') return `<div class="portal-card"><h3>Dispatch calendar</h3><table class="portal-mini-table"><tr><th>Date</th><th>Window</th><th>Job</th><th>Crew</th></tr><tr><td>Today</td><td>9–11 AM</td><td>Williamsburg 1BR</td><td>Mara / Ana / Dev</td></tr><tr><td>Tomorrow</td><td>12–3 PM</td><td>Brooklyn → Miami load</td><td>Team B</td></tr><tr><td>Friday</td><td>Flexible</td><td>MÜVPool corridor</td><td>Pending</td></tr></table></div>`;
    if(view==='inventory') return `<div class="portal-split"><div class="portal-card"><h3>Customer inventory</h3>${inventoryPreview}</div><div class="portal-card"><h3>Volume change alerts</h3><span class="portal-stat-number">+14%</span><p>Customer added storage bins and a treadmill after original scan. Review quote before dispatch.</p><button class="btn primary">Approve revision</button></div></div>`;
    if(view==='messages') return `<div class="portal-split"><div class="portal-card"><h3>Priority threads</h3>${['Customer asked about elevator window','Crew reported parking issue','Management requested COI revision'].map(x=>`<p class="select-card">${x}</p>`).join('')}</div><div class="portal-card"><h3>Message composer</h3><div class="field"><label>Reply</label><textarea rows="5">Hi Jodi — we are confirmed, COI-capable, and will keep updates inside MÜV.</textarea></div><button class="btn primary" style="margin-top:12px">Send</button></div></div>`;
    if(view==='crew') return `<div class="portal-list-grid">${['Mara Lee · Crew lead','Ana Ortiz · Driver','Dev Patel · Mover','Sofia Kim · Dispatcher'].map(x=>`<div class="portal-card"><h3>${x}</h3><p class="pill green">Active</p><p>Can view assigned moves, inventory, route/address, building notes, send customer messages, update move status, and report issues.</p><button class="btn ghost">Edit permissions</button></div>`).join('')}</div>`;
    if(view==='routes') return `<div class="portal-split"><div class="portal-card"><h3>Today’s optimized route</h3><div class="route-map"><span class="pin a"></span><span class="pin b"></span><svg class="tracking-truck truck-svg" viewBox="0 0 320 160" aria-hidden="true" focusable="false"><rect x="32" y="54" width="176" height="62" rx="16" class="truck-box-svg"></rect><path d="M210 70h46l32 34v12h-78z" class="truck-cab-svg"></path><rect x="222" y="78" width="30" height="20" rx="5" class="truck-window-svg"></rect><path d="M64 72h76" class="truck-line-svg"></path><circle cx="84" cy="122" r="18" class="truck-wheel-svg"></circle><circle cx="244" cy="122" r="18" class="truck-wheel-svg"></circle></svg></div><p>2 trucks · 5 stops · 31.4 miles · 78% capacity utilization</p><span class="pill amber">COI needed at stop 2</span></div><div class="portal-card"><h3>MÜVPool opportunities</h3><p>3 compatible pooled shipments found. Detour ratio below 1.18 and savings above 14%.</p><button class="btn primary">Run optimization</button></div></div>`;
    if(view==='exports') return `<div class="portal-list-grid">${['leads.csv','bookings.csv','inventory.json','route-plans.csv','coi-status.csv','crew-assignments.csv'].map(x=>`<div class="portal-card"><h3>${x}</h3><p>Exportable, filterable, sortable operational data.</p><button class="btn ghost">Download</button></div>`).join('')}</div>`;
    if(view==='profile') return `<div class="portal-card"><h3>Customizable mover profile</h3><div class="grid two"><input value="Atlas Blue Moving Co."><input value="(917) 555-0188"><input value="dispatch@atlasblue.test"><input value="NYC, Brooklyn, Queens, Jersey City"><textarea rows="4">COI-ready apartment specialists with full-service packing and premium building workflows.</textarea><textarea rows="4">License, insurance, cancellation policy, service area, operating hours, terms.</textarea></div><button class="btn primary" style="margin-top:18px">Save profile</button></div>`;
    return '';
  }

  function modal(html){document.getElementById('modalMount').innerHTML=`<div class="modal-backdrop"><div class="modal">${html}</div></div>`;}
  function closeModal(){document.getElementById('modalMount').innerHTML='';}
  window.MUV={closeModal};
  function toast(text){
    const t=document.createElement('div'); t.className='pill blue'; t.textContent=text; t.style.cssText='position:fixed;left:50%;bottom:24px;transform:translateX(-50%);z-index:2000;box-shadow:0 18px 40px rgba(10,37,64,.18);background:#fff'; document.body.appendChild(t); setTimeout(()=>t.remove(),2600);
  }
})();
</script>
</body>
